name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - "docs-site/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push docs image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docs-site
          file: docs-site/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/upki-ra-docs:latest
            ghcr.io/${{ github.repository_owner }}/upki-ra-docs:${{ github.sha }}
          build-args: |
            NUXT_APP_BASE_URL=/upki-ra/
            NUXT_SITE_URL=https://docs.circle-cyber.com/upki-ra
          cache-from: type=gha
          cache-to: type=gha,mode=max
